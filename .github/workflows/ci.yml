name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: 22
            validation_command: npm test
          - os: macos-latest
            node: 22
            validation_command: npm test
          - os: windows-latest
            node: 22
            validation_command: npm test
          # The bundled simple FTS extension does not ship a linux-arm64 asset yet,
          # so Ubuntu ARM validates build, unit tests, package creation, and CLI startup.
          - os: ubuntu-24.04-arm
            node: 22
            validation_command: npm run build && npx vitest run tests/unit

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate
        run: ${{ matrix.validation_command }}

      - name: Pack npm artifact
        id: pack
        shell: bash
        run: |
          PACKAGE_TGZ="$(npm pack --json | node -e "let input=''; process.stdin.on('data', d => input += d); process.stdin.on('end', () => console.log(JSON.parse(input)[0].filename));")"
          echo "tgz=${PACKAGE_TGZ}" >> "${GITHUB_OUTPUT}"

      - name: Install packed CLI globally
        run: npm install -g "${{ steps.pack.outputs.tgz }}"

      - name: Smoke test CLI on POSIX
        if: runner.os != 'Windows'
        run: tiangong-wiki --help

      - name: Smoke test CLI on Windows native shell
        if: runner.os == 'Windows'
        shell: pwsh
        run: tiangong-wiki.cmd --help
